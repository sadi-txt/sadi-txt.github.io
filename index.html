*{

.btn-outline{

}

    height:auto;

footer{

    padding:2rem;
    color:var(--muted);
}

@media(max-width:768px){

        grid-template-columns:1fr;
        text-align:center;
        padding:2rem 0;

    .badges{
        justify-content:center;
    }

    .links{
